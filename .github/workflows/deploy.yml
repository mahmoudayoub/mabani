name: Deploy to Dev

on:
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend
          - infrastructure
          - boq

permissions:
  id-token: write # Required for requesting the JWT
  contents: read  # Required for actions/checkout

jobs:
  build-and-deploy:
    name: Build, Test & Deploy
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # --- COMPLIANCE & TESTS ---

      # Frontend Checks (Build required for CDK Synth)
      - name: Install Frontend Deps
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'frontend' }}
        working-directory: ./frontend
        run: npm ci

      - name: Frontend Build Check
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'frontend' }}
        working-directory: ./frontend
        run: |
          touch .env
          npm run build

      # Infrastructure Checks
      - name: Install Infrastructure Deps
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'infrastructure' }}
        run: |
          cd infrastructure
          npm ci

      - name: CDK Synth (Infrastructure Validation)
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'infrastructure' }}
        working-directory: ./infrastructure
        run: npx cdk synth

      # Backend Checks
      - name: Install Backend Deps
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'backend' }}
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Backend Lint
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'backend' }}
        working-directory: ./backend
        run: flake8 lambdas/ --count --select=E9,F63,F7,F82 --show-source --statistics

      # --- DEPLOYMENT ---
      
      - name: Make Script Executable
        run: chmod +x ./scripts/deploy/deploy.sh

      - name: Deploy Infrastructure
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'infrastructure' }}
        run: ./scripts/deploy/deploy.sh dev infra

      - name: Deploy Backend
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'backend' }}
        run: ./scripts/deploy/deploy.sh dev backend

      - name: Deploy BOQ
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'boq' }}
        run: ./scripts/deploy/deploy.sh dev boq

      - name: Update Configuration
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'frontend' }}
        env:
          VITE_DELETION_API_URL: ${{ secrets.VITE_DELETION_API_URL }}
        run: ./scripts/deploy/deploy.sh dev config

      - name: Deploy Frontend
        if: ${{ github.event.inputs.component == 'all' || github.event.inputs.component == 'frontend' }}
        run: ./scripts/deploy/deploy.sh dev frontend
