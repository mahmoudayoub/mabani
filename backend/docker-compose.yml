version: '3.8'

services:
  almabani:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: almabani-boq
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Persist data across container restarts
      - almabani-logs:/app/data/logs
    restart: unless-stopped

volumes:
  almabani-logs:
